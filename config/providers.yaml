# AI Provider Configuration
# Game MCP supports multiple AI providers

providers:
  anthropic:
    name: "Anthropic Direct"
    description: "Claude via Anthropic API - used with Claude Code"
    models:
      default: claude-sonnet-4-20250514
      fast: claude-haiku
      advanced: claude-opus-4-20250514
    features:
      mcp: true
      tools: true
      vision: true

  gemini:
    name: "Google Gemini"
    description: "Gemini models for image generation and visual analysis"
    models:
      image: gemini-2.5-flash
      vision: gemini-2.5-flash
    config:
      use_vertex: false
    features:
      image_generation: true
      image_analysis: true

active: anthropic

# MCP Server Configuration
mcp:
  servers:
    doomed-team:
      module: "doomed.mcp_team"
      state_file: "./workflow/team-state.json"
      tools:
        - create_task
        - get_tasks
        - update_task
        - search_tasks
        - log_decision
        - get_decisions
        - get_context
        - add_task_dependency
        - get_blocked_tasks
        - bible_status
        - bible_gaps
