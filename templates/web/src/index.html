<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{GAME_NAME}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
    }
    #game-container {
      position: relative;
    }
    canvas {
      display: block;
      border: 2px solid #16213e;
      border-radius: 4px;
    }
    #ui-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #ui-overlay.active { pointer-events: auto; }
    .menu-title {
      font-size: 48px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 20px;
    }
    .menu-btn {
      background: #0f3460;
      border: 2px solid #533483;
      color: #eee;
      padding: 12px 32px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      margin: 8px;
      transition: all 0.2s;
    }
    .menu-btn:hover {
      background: #533483;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="800" height="600"></canvas>
    <div id="ui-overlay" class="active">
      <div class="menu-title">{{GAME_NAME}}</div>
      <button class="menu-btn" id="btn-start">Start Game</button>
    </div>
  </div>

  <script>
    // ── Game State ──────────────────────────────────────────
    const SCREEN = { MENU: 'menu', PLAY: 'play', PAUSE: 'pause', GAMEOVER: 'gameover' };

    const state = {
      screen: SCREEN.MENU,
      keys: {},
      time: 0,
    };

    // ── Canvas Setup ────────────────────────────────────────
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('ui-overlay');

    // ── Input ───────────────────────────────────────────────
    document.addEventListener('keydown', (e) => { state.keys[e.code] = true; });
    document.addEventListener('keyup', (e) => { state.keys[e.code] = false; });
    document.getElementById('btn-start').addEventListener('click', () => {
      state.screen = SCREEN.PLAY;
      overlay.classList.remove('active');
    });

    // ── Update ──────────────────────────────────────────────
    function update(dt) {
      if (state.screen !== SCREEN.PLAY) return;
      state.time += dt;

      // TODO: Game logic goes here
      // This is where /engineer implements gameplay
    }

    // ── Render ──────────────────────────────────────────────
    function render() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (state.screen === SCREEN.PLAY) {
        // TODO: Game rendering goes here
        ctx.fillStyle = '#eee';
        ctx.font = '20px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('Game is running! Edit src/index.html to build your game.', canvas.width / 2, canvas.height / 2);
        ctx.font = '14px system-ui';
        ctx.fillStyle = '#888';
        ctx.fillText(`Time: ${state.time.toFixed(1)}s`, canvas.width / 2, canvas.height / 2 + 30);
      }
    }

    // ── Game Loop ───────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
