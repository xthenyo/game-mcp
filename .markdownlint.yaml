# Markdownlint configuration for Bible docs

# Allow HTML in markdown (for tables and special formatting)
MD033: false

# Allow inline HTML
MD013:
  line_length: 200
  heading_line_length: 200
  code_block_line_length: 200

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow trailing punctuation in headings (for ? and !)
MD026: false

# Allow multiple top-level headings (each Bible file may have multiple)
MD025: false

# Allow bare URLs
MD034: false
